name: Release Candidate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Run validation only, or publish after all publish gates pass.'
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish
      confirm_package_name:
        description: 'Required for publish mode; must equal package.json name.'
        required: false
        type: string
      confirm_version:
        description: 'Required for publish mode; must equal package.json version and selected v* tag.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-candidate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    outputs:
      package_name: ${{ steps.pack.outputs.package_name }}
      package_version: ${{ steps.pack.outputs.package_version }}
      package_tarball: ${{ steps.pack.outputs.package_tarball }}
      sbom_file: ${{ steps.sbom.outputs.sbom_file }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify npm supports trusted publishing
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process')

          const version = execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim()
          const [major, minor, patch] = version.split('.').map(Number)

          if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) {
            throw new Error(`npm ${version} is below the trusted publishing floor 11.5.1`)
          }

          console.log(`npm ${version} supports trusted publishing`)
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check generated distribution
        run: pnpm dist:check

      - name: Check package inventory
        run: pnpm packlist:check

      - name: Check release candidate hygiene
        run: pnpm release-candidate:check

      - name: Check package metadata and distribution
        run: pnpm package:check

      - name: Pack release candidate
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          npm pack --json --ignore-scripts --pack-destination release-artifacts > release-artifacts/npm-pack.json
          node --input-type=module <<'NODE'
          import { appendFile, readFile } from 'node:fs/promises'

          const pack = JSON.parse(await readFile('release-artifacts/npm-pack.json', 'utf8'))
          const packageJson = JSON.parse(await readFile('package.json', 'utf8'))
          const filename = pack[0]?.filename
          if (typeof filename !== 'string' || !filename.endsWith('.tgz')) {
            throw new Error('npm pack did not produce a .tgz artifact filename.')
          }

          await appendFile(
            process.env.GITHUB_OUTPUT,
            [
              `package_name=${packageJson.name}`,
              `package_version=${packageJson.version}`,
              `package_tarball=${filename}`,
              '',
            ].join('\n'),
          )
          NODE

      - name: Generate retained SPDX SBOM
        id: sbom
        shell: bash
        run: |
          set -euo pipefail
          tarball='${{ steps.pack.outputs.package_tarball }}'
          sbom_file="${tarball%.tgz}.spdx.json"
          pnpm supply-chain:local:proof -- --from-tgz "release-artifacts/${tarball}" --output "release-artifacts/${sbom_file}"
          echo "sbom_file=${sbom_file}" >> "${GITHUB_OUTPUT}"

      - name: Generate SHA-256 manifest
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum '${{ steps.pack.outputs.package_tarball }}' '${{ steps.sbom.outputs.sbom_file }}' npm-pack.json > SHA256SUMS

      - name: Upload release candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-release-candidate-${{ steps.pack.outputs.package_version }}
          path: |
            release-artifacts/${{ steps.pack.outputs.package_tarball }}
            release-artifacts/${{ steps.sbom.outputs.sbom_file }}
            release-artifacts/SHA256SUMS
            release-artifacts/npm-pack.json
          if-no-files-found: error
          retention-days: 90

  attest:
    name: Attest public release candidate artifacts
    needs: release-candidate
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Download validated release candidate artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-release-candidate-${{ needs.release-candidate.outputs.package_version }}
          path: release-artifacts

      - name: Generate tarball provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: release-artifacts/${{ needs.release-candidate.outputs.package_tarball }}

      - name: Generate SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: release-artifacts/${{ needs.release-candidate.outputs.package_tarball }}
          sbom-path: release-artifacts/${{ needs.release-candidate.outputs.sbom_file }}

  publish:
    name: Publish to npm with trusted publishing
    needs: release-candidate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode == 'publish' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify publish guard inputs
        shell: bash
        env:
          CONFIRM_PACKAGE_NAME: ${{ inputs.confirm_package_name }}
          CONFIRM_VERSION: ${{ inputs.confirm_version }}
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          package_private="$(node -p "String(require('./package.json').private === true)")"

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Publish mode must be run from a selected release tag, not ${GITHUB_REF_TYPE}."
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "v${package_version}" ]]; then
            echo "Selected tag ${GITHUB_REF_NAME} must match package version v${package_version}."
            exit 1
          fi
          if [[ "${CONFIRM_PACKAGE_NAME}" != "${package_name}" ]]; then
            echo "confirm_package_name must exactly equal ${package_name}."
            exit 1
          fi
          if [[ "${CONFIRM_VERSION}" != "${package_version}" ]]; then
            echo "confirm_version must exactly equal ${package_version}."
            exit 1
          fi
          if [[ "${package_private}" == "true" ]]; then
            echo "package.json private is true; public npm publish remains blocked."
            exit 1
          fi

      - name: Download validated release candidate artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-release-candidate-${{ needs.release-candidate.outputs.package_version }}
          path: release-artifacts

      - name: Publish exact tarball to npm
        run: npm publish "release-artifacts/${{ needs.release-candidate.outputs.package_tarball }}" --access public
