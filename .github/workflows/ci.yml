
name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  docs-and-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.9.26"
          enable-cache: true
      - run: uv python install 3.13.5
      - run: uv sync --project . --frozen
      - run: uv run --project . --frozen python tools/verify_repo.py
      - run: uv run --project . --frozen python tools/verify_docs.py
      - run: uv run --project . --frozen python tools/verify_planning.py
      - run: uv run --project . --frozen python tools/generate_doc_index.py --check
      - run: uv run --project . --frozen python tools/generate_repository_metadata.py --check
      - run: uv run --project . --frozen python -m unittest discover -s services/adapter-host-python/tests
      - run: uv run --project . --frozen python -m unittest discover -s tools/tests
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
        with: { components: rustfmt,clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.0.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.23.1, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
