name: Fast Gate

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: fast-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: Fast Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: "2026.7.7"
          cache: true
      - name: Bootstrap pinned tools and frozen dependencies
        run: just bootstrap
      - name: Reject generated, lockfile or untracked drift from bootstrap
        run: uv run --project . --frozen python tools/verify_worktree_clean.py
      - name: Run complete fast gate
        run: just check
      - name: Reject verification drift
        run: uv run --project . --frozen python tools/verify_worktree_clean.py
