
name: Protocol Compatibility
on:
  pull_request:
    paths:
      - "protocols/**"
      - "generated/**"
      - "tools/protocol_codegen.py"
      - "tools/tests/test_protocol_codegen.py"
      - "Justfile"
      - ".github/workflows/protocol-compatibility.yml"
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.71.0"
          github_token: ${{ github.token }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.26"
          enable-cache: true
      - run: uv python install 3.13.5
      - name: Check protocol contracts against pull request base
        if: github.event_name == 'pull_request'
        run: >-
          uv run --project . --frozen python tools/protocol_codegen.py check
          --base-ref "${{ github.event.pull_request.base.sha }}"
      - name: Check protocol contracts against pushed parent
        if: github.event_name == 'push'
        run: >-
          uv run --project . --frozen python tools/protocol_codegen.py check
          --base-ref "${{ github.event.before }}"
      - run: >-
          uv run --project . --frozen python -m unittest discover
          -s tools/tests -p test_protocol_codegen.py
