
name: Protocol Compatibility
on:
  pull_request:
    paths:
      - "protocols/**"
      - "generated/**"
      - "tools/protocol_codegen.py"
      - "tools/tests/test_protocol_codegen.py"
      - "Justfile"
      - ".github/workflows/protocol-compatibility.yml"
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.71.0"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.9.26"
          enable-cache: true
      - run: uv python install 3.13.5
      - run: uv run --project . --frozen python tools/protocol_codegen.py check
      - run: uv run --project . --frozen python -m unittest discover -s tools/tests -p test_protocol_codegen.py
