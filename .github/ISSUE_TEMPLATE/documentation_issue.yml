name: Documentation issue
description: Report missing, confusing, or stale documentation.
title: "Docs: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Which page, section, command, or concept needs documentation work?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing, inaccurate, or hard to follow?
    validations:
      required: true
