name: Documentation issue
description: Report missing, confusing, or stale documentation.
title: "Docs: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets or sensitive data in public documentation issues. Remove credentials, tokens, cookies, private prompts, memory records, proprietary outputs, full transcripts, provider configs, account identifiers, and unredacted local paths. If the report requires vulnerability details or sensitive data, use the security disclosure path instead of this public template.
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Which page, section, command, or concept needs documentation work?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing, inaccurate, or hard to follow?
    validations:
      required: true
  - type: dropdown
    id: claim-boundary
    attributes:
      label: Claim boundary risk
      description: Does the issue involve launch, package, hosted, runtime, memory, Builder, or subagent readiness claims?
      options:
        - No claim-boundary concern
        - Public launch or GA wording
        - Public npm or package distribution wording
        - Hosted, SaaS, or production-readiness wording
        - Runtime, memory, Builder, or managed-subagent capability wording
        - Not sure
    validations:
      required: true
