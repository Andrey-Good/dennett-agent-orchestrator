name: Security report redirect
description: Do not file security vulnerabilities as public issues.
title: "Security report redirect"
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, credentials, private prompts, provider config, or vulnerability details in a public issue.

        Use the repository security reporting process in `SECURITY.md` instead. If you already pasted sensitive data into an issue, rotate the affected credential immediately.

        This template is only a redirect for cases where a public issue is unavoidable. It is not the place to describe the vulnerability.
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have not included vulnerability details, exploit steps, credentials, private prompts, memory records, provider config, or unredacted logs in this public issue.
          required: true
