name: Support request
description: Ask for help with local setup, diagnostics, or expected behavior.
title: "Support: "
labels: ["support"]
body:
  - type: markdown
    attributes:
      value: |
        **Sensitive data warning:** Do not paste credentials, API keys/tokens, provider config, account/profile data, private prompts/replies, memory records, unredacted logs, or raw runtime-env output into this public issue.

        If your request includes sensitive security details, follow `SECURITY.md` instead.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe the local behavior you need help with.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Local context
      description: Include relevant commands, redacted errors, and a reviewed support bundle if useful.
    validations:
      required: false
