name: Bug report
description: Report a reproducible product or CLI defect.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Sensitive data warning:** Do not paste credentials, API keys/tokens, provider config, account/profile data, private prompts/replies, memory records, unredacted logs, or raw runtime-env output into this public issue.

        If your report includes sensitive security details, follow `SECURITY.md` instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest local command or fixture that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: support-bundle
    attributes:
      label: Redacted support bundle
      description: Paste `dennett-agent-orchestrator support-bundle` output only after reviewing it locally.
      render: json
    validations:
      required: false
