name: Bug report
description: Report a reproducible product or CLI defect.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Sensitive data warning:** Do not paste credentials, API keys/tokens, provider config, account/profile data, private prompts/replies, memory records, unredacted logs, or raw runtime-env output into this public issue.

        If your report includes sensitive security details, follow `SECURITY.md` instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest local command or fixture that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Local environment
      description: Include OS, Node.js version, pnpm version, commit or branch, and whether you used a source checkout or local tarball proof. Do not include account identifiers or provider secrets.
      placeholder: Windows 11; Node 22.x; pnpm 10.x; local checkout commit <short-sha>.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Select the closest bounded local surface.
      options:
        - Local checkout build
        - Local CLI command
        - Agent JSON or schema validation
        - Local state or resume behavior
        - Runtime adapter path
        - Memory provider path
        - Controlled local tarball proof
        - Documentation or examples
        - Not sure
    validations:
      required: true
  - type: textarea
    id: support-bundle
    attributes:
      label: Redacted support bundle
      description: Paste `dennett-agent-orchestrator support-bundle` output only after reviewing it locally.
      render: json
    validations:
      required: false
