version: v2
modules:
  - path: proto
lint:
  use: [STANDARD]
  # File-level ignores preserve only the pre-M00 wire surface. The protocol
  # checker fingerprints every existing violation so additions in these files
  # still fail even though Buf has no definition-level suppression.
  ignore_only:
    RPC_REQUEST_RESPONSE_UNIQUE:
      - proto/dennett/v1/sync.proto
    RPC_REQUEST_STANDARD_NAME:
      - proto/dennett/v1/control.proto
      - proto/dennett/v1/memory.proto
      - proto/dennett/v1/sync.proto
    RPC_RESPONSE_STANDARD_NAME:
      - proto/dennett/v1/control.proto
      - proto/dennett/v1/memory.proto
      - proto/dennett/v1/sync.proto
    SERVICE_SUFFIX:
      - proto/dennett/v1/control.proto
      - proto/dennett/v1/memory.proto
      - proto/dennett/v1/sync.proto
breaking:
  use: [WIRE_JSON]
