syntax = "proto3";

package dennett.common.v1;

import "google/protobuf/timestamp.proto";

// StableRef identifies a canonical object without embedding its private payload.
message StableRef {
  string kind = 1;
  string id = 2;
}

// CommandMetadata is supplied by the trusted client bridge for every mutation.
message CommandMetadata {
  string command_id = 1;
  string idempotency_key = 2;
  string correlation_id = 3;
  uint64 authority_epoch_seen = 4;
  google.protobuf.Timestamp created_at = 5;
  // Absence means that no optimistic revision check was requested.
  optional uint64 expected_revision = 6;
  // Opaque authenticated bridge session returned by the handshake.
  string client_session_id = 7;
}

// CommandAccepted acknowledges durable command admission, not completion.
message CommandAccepted {
  string command_id = 1;
  string correlation_id = 2;
  string operation_id = 3;
  // Revision of durable admission bookkeeping, never the target entity revision.
  uint64 accepted_revision = 4;
}

// ErrorEnvelope is safe for cross-process handling and UI localization.
// Domain failures occupy the error arm of a unary response or watch frame;
// non-OK gRPC status is reserved for failures that prevent decoding a response.
message ErrorEnvelope {
  string code = 1;
  string message_key = 2;
  string correlation_id = 3;
  bool retryable = 4;
  bool user_action_required = 5;
  string details_handle = 6;
  // Present only when recovery requires the caller to reconcile a stale revision.
  optional uint64 current_revision = 7;
}

message CommandResult {
  uint64 completed_revision = 1;
  repeated StableRef canonical_refs = 2;
  string message_key = 3;
  bool partial = 4;
}

// CommandTerminal is the authoritative completion paired with CommandAccepted.
message CommandTerminal {
  string command_id = 1;
  string operation_id = 2;
  oneof outcome {
    CommandResult result = 3;
    ErrorEnvelope error = 4;
  }
}
