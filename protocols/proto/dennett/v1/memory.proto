syntax = "proto3";
package dennett.v1;

import "dennett/v1/common.proto";

message AppendMemoryEventRequest {
  string event_id = 1;
  string project_id = 2;
  string session_id = 3;
  string kind = 4;
  string summary = 5;
}
message AppendMemoryEventResponse {
  StableRef event = 1;
}
service DennettMemory {
  rpc Append(AppendMemoryEventRequest) returns (AppendMemoryEventResponse);
}
