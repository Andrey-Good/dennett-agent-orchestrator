
syntax = "proto3";
package dennett.v1;
import "dennett/v1/common.proto";

message SyncHello { string device_id = 1; uint64 authority_epoch_seen = 2; map<string,uint64> watermarks = 3; }
message SyncWelcome { uint64 authority_epoch = 1; HeadEligibility head_eligibility = 2; bool resync_required = 3; }
message Operation { string command_id = 1; string payload_type = 2; bytes payload = 3; uint64 authority_epoch_seen = 4; }
message OperationBatch { repeated Operation operations = 1; }
service DennettSync { rpc Synchronize(stream OperationBatch) returns (stream OperationBatch); }
