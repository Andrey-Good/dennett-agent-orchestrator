syntax = "proto3";

package dennett.control.v1;

import "dennett/common/v1/common.proto";
import "dennett/sync/v1/watch.proto";
import "google/protobuf/timestamp.proto";

enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_IDLE = 1;
  SESSION_STATE_RUNNING = 2;
  SESSION_STATE_WAITING = 3;
  SESSION_STATE_FAILED = 4;
  SESSION_STATE_ARCHIVED = 5;
}

enum TurnRole {
  TURN_ROLE_UNSPECIFIED = 0;
  TURN_ROLE_USER = 1;
  TURN_ROLE_AGENT = 2;
  TURN_ROLE_SYSTEM = 3;
}

enum TurnState {
  TURN_STATE_UNSPECIFIED = 0;
  TURN_STATE_ACCEPTED = 1;
  TURN_STATE_STREAMING = 2;
  TURN_STATE_COMPLETED = 3;
  TURN_STATE_CANCELLED = 4;
  TURN_STATE_TIMED_OUT = 5;
  TURN_STATE_FAILED = 6;
}

enum TurnDeliveryMode {
  TURN_DELIVERY_MODE_UNSPECIFIED = 0;
  TURN_DELIVERY_MODE_NEW_TURN = 1;
  TURN_DELIVERY_MODE_STEER_NOW = 2;
}

enum TurnActivityStatus {
  TURN_ACTIVITY_STATUS_UNSPECIFIED = 0;
  TURN_ACTIVITY_STATUS_STARTED = 1;
  TURN_ACTIVITY_STATUS_UPDATED = 2;
  TURN_ACTIVITY_STATUS_COMPLETED = 3;
  TURN_ACTIVITY_STATUS_FAILED = 4;
}

message SessionSummary {
  string session_id = 1;
  // Empty for a standalone session backed by the Node-owned scratch workspace.
  string project_id = 2;
  string title = 3;
  SessionState state = 4;
  uint64 revision = 5;
  string active_turn_id = 6;
  google.protobuf.Timestamp last_activity_at = 7;
}

message ContextAttachment {
  dennett.common.v1.StableRef source = 1;
  string label = 2;
}

message ResultEnvelope {
  string command_id = 1;
  string turn_id = 2;
  string summary = 3;
  bool partial = 4;
  repeated dennett.common.v1.StableRef artifacts = 5;
  repeated dennett.common.v1.StableRef evidence = 6;
}

message TurnSnapshot {
  string turn_id = 1;
  string command_id = 2;
  TurnRole role = 3;
  TurnState state = 4;
  string text = 5;
  oneof outcome {
    ResultEnvelope result = 6;
    dennett.common.v1.ErrorEnvelope error = 7;
  }
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp completed_at = 9;
  repeated TurnActivitySnapshot activities = 10;
  // Canonical session revision that created this turn; unlike wall time it is
  // a total order and remains stable after restart.
  uint64 created_revision = 11;
}

message TurnActivitySnapshot {
  string activity_id = 1;
  string phase = 2;
  optional string message = 3;
  TurnActivityStatus status = 4;
  google.protobuf.Timestamp updated_at = 5;
  repeated NativeExtensionPayload native_extensions = 6;
  // Stable first-observed time used to preserve causal placement across updates.
  google.protobuf.Timestamp created_at = 7;
  // Canonical session revision that first created this activity.
  uint64 created_revision = 8;
}

message NativeExtensionPayload {
  string namespace = 1;
  string schema_version = 2;
  string json_value = 3;
}

message SessionSnapshot {
  SessionSummary session = 1;
  bytes snapshot_fingerprint = 2;
  repeated TurnSnapshot turns = 3;
}

message TurnTextAppend {
  string turn_id = 1;
  string text = 2;
}

message TurnTerminal {
  string turn_id = 1;
  TurnState state = 2;
  oneof outcome {
    ResultEnvelope result = 3;
    dennett.common.v1.ErrorEnvelope error = 4;
  }
}

message TurnActivityUpsert {
  string turn_id = 1;
  TurnActivitySnapshot activity = 2;
}

message SessionMetadataUpdate {
  // Presence distinguishes no change from explicitly clearing a string field.
  optional string title = 1;
  optional SessionState state = 2;
  optional string active_turn_id = 3;
}

message SessionMutation {
  oneof mutation {
    TurnSnapshot upsert_turn = 1;
    TurnTextAppend append_turn_text = 2;
    TurnTerminal finish_turn = 3;
    SessionMetadataUpdate update_session = 4;
    TurnActivityUpsert upsert_turn_activity = 5;
  }
}

message SessionDelta {
  // base_revision must equal the client's current revision before mutations apply.
  uint64 base_revision = 1;
  uint64 new_revision = 2;
  repeated SessionMutation mutations = 3;
  // Authoritative commit time shared by every mutation in this journal event.
  google.protobuf.Timestamp committed_at = 4;
}

message SessionWatchFrame {
  // The first domain frame is a snapshot. Apply later frames only when the
  // cursor epoch matches bootstrap and sequences increase by exactly one.
  dennett.sync.v1.WatchCursor cursor = 1;
  oneof frame {
    SessionSnapshot snapshot = 2;
    SessionDelta delta = 3;
    dennett.sync.v1.WatchHeartbeat heartbeat = 4;
    dennett.sync.v1.ResyncRequired resync_required = 5;
    dennett.common.v1.ErrorEnvelope error = 6;
  }
}

message CreateSessionRequest {
  dennett.common.v1.CommandMetadata command = 1;
  // Empty creates a standalone session.
  string project_id = 2;
  string title = 3;
}

// CreateSessionAccepted allocates identity but does not claim session completion.
message CreateSessionAccepted {
  dennett.common.v1.CommandAccepted command = 1;
  string session_id = 2;
}

message CreateSessionResponse {
  oneof outcome {
    CreateSessionAccepted accepted = 1;
    dennett.common.v1.ErrorEnvelope error = 2;
  }
}

message SendTurnRequest {
  dennett.common.v1.CommandMetadata command = 1;
  string project_id = 2;
  string session_id = 3;
  string text = 4;
  repeated ContextAttachment attachments = 5;
  repeated RuntimeControlSelection runtime_controls = 6;
  // Unspecified is treated as NEW_TURN for backward compatibility.
  TurnDeliveryMode delivery_mode = 7;
  // Required for STEER_NOW so a stale client cannot steer a newer active turn.
  string expected_active_turn_id = 8;
}

message RuntimeControlSelection {
  string control_id = 1;
  string choice_id = 2;
}

message SendTurnAccepted {
  dennett.common.v1.CommandAccepted command = 1;
  string turn_id = 2;
}

message SendTurnResponse {
  oneof outcome {
    SendTurnAccepted accepted = 1;
    dennett.common.v1.ErrorEnvelope error = 2;
  }
}

message CancelTurnRequest {
  dennett.common.v1.CommandMetadata command = 1;
  string project_id = 2;
  string session_id = 3;
  string turn_id = 4;
}

message CancelTurnResponse {
  oneof outcome {
    dennett.common.v1.CommandAccepted accepted = 1;
    dennett.common.v1.ErrorEnvelope error = 2;
  }
}

message WatchSessionRequest {
  string session_id = 1;
  // A value is a freshness hint only; every stream still starts with a snapshot.
  optional uint64 known_revision = 2;
  string client_session_id = 3;
}

message WatchSessionResponse {
  SessionWatchFrame frame = 1;
}

// ComposerDraft is durable client-local state. It never enters the canonical
// session event journal. command_id is retained when the draft becomes SendTurn.
message ComposerDraft {
  string project_id = 1;
  string session_id = 2;
  string command_id = 3;
  string text = 4;
  google.protobuf.Timestamp updated_at = 5;
  // Monotonic within one stable draft command. Older saves are ignored.
  uint64 revision = 6;
}

message GetComposerDraftRequest {
  string project_id = 1;
  string session_id = 2;
  string client_session_id = 3;
}

message ComposerDraftMissing {
  string session_id = 1;
}

message GetComposerDraftResponse {
  oneof outcome {
    ComposerDraft draft = 1;
    ComposerDraftMissing missing = 2;
    dennett.common.v1.ErrorEnvelope error = 3;
  }
}

message SaveComposerDraftRequest {
  // operation.command_id identifies this save; draft.command_id remains stable
  // across saves and is later reused by SendTurn.
  dennett.common.v1.CommandMetadata operation = 1;
  ComposerDraft draft = 2;
}

enum ComposerDraftWriteState {
  COMPOSER_DRAFT_WRITE_STATE_UNSPECIFIED = 0;
  COMPOSER_DRAFT_WRITE_STATE_SAVED = 1;
  COMPOSER_DRAFT_WRITE_STATE_ALREADY_ACCEPTED = 2;
}

message ComposerDraftWriteReceipt {
  string session_id = 1;
  string command_id = 2;
  google.protobuf.Timestamp persisted_at = 3;
  ComposerDraftWriteState state = 4;
}

message SaveComposerDraftResponse {
  oneof outcome {
    ComposerDraftWriteReceipt saved = 1;
    dennett.common.v1.ErrorEnvelope error = 2;
  }
}

message DiscardComposerDraftRequest {
  dennett.common.v1.CommandMetadata operation = 1;
  string project_id = 2;
  string session_id = 3;
  string draft_command_id = 4;
}

message ComposerDraftDiscarded {
  string session_id = 1;
  bool existed = 2;
}

message DiscardComposerDraftResponse {
  oneof outcome {
    ComposerDraftDiscarded discarded = 1;
    dennett.common.v1.ErrorEnvelope error = 2;
  }
}

service SessionService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc SendTurn(SendTurnRequest) returns (SendTurnResponse);
  rpc CancelTurn(CancelTurnRequest) returns (CancelTurnResponse);
  rpc WatchSession(WatchSessionRequest) returns (stream WatchSessionResponse);
  rpc GetComposerDraft(GetComposerDraftRequest) returns (GetComposerDraftResponse);
  rpc SaveComposerDraft(SaveComposerDraftRequest) returns (SaveComposerDraftResponse);
  rpc DiscardComposerDraft(DiscardComposerDraftRequest) returns (DiscardComposerDraftResponse);
}
