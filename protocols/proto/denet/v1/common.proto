
syntax = "proto3";
package denet.v1;

message StableRef { string kind = 1; string id = 2; }
message ErrorEnvelope { string code = 1; string message = 2; bool retryable = 3; }

enum HeadEligibility {
  HEAD_ELIGIBILITY_UNSPECIFIED = 0;
  HEAD_ELIGIBILITY_NONE = 1;
  HEAD_ELIGIBILITY_EMERGENCY = 2;
  HEAD_ELIGIBILITY_FULL = 3;
}
