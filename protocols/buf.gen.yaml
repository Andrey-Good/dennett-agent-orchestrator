version: v2
clean: true
plugins:
  - remote: buf.build/community/neoeinstein-prost:v0.5.0
    revision: 1
    out: generated/rust
    opt:
      - boxed=.dennett.control.v1.WorkspaceWatchFrame.frame.snapshot
      - boxed=.dennett.control.v1.GetWorkspaceResponse.outcome.snapshot
      - boxed=.dennett.control.v1.GetWorkspaceResponse.outcome.error
  - remote: buf.build/community/neoeinstein-tonic:v0.5.0
    revision: 1
    out: generated/rust
  - remote: buf.build/bufbuild/es:v2.12.1
    revision: 1
    out: generated/ts
    opt:
      - target=ts
