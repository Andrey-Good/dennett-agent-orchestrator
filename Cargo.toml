
[workspace]
resolver = "2"
members = [
  "crates/denet-contracts",
  "crates/denet-kernel",
  "crates/denet-agent-core",
  "crates/denet-memory-core",
  "crates/denet-trust-core",
  "crates/denet-effect-core",
  "crates/denet-sync-core",
  "crates/denet-observability",
  "services/head",
  "services/node",
  "services/memoryd",
  "services/sensor-worker",
  "tools/denetctl",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
publish = false
rust-version = "1.85"

[workspace.dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time", "sync"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
uuid = { version = "1", features = ["v7", "serde"] }
