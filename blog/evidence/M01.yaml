    - docs/design/WP-M01-003/owner-direction-v5.md
    - design-qa.md
    - VALIDATION.md
  claim_ledger:
    - id: M01-SUBSCRIPTION-CODEX
      claim: "The live path used Codex-managed ChatGPT subscription authentication without an API key, proved two turns on one observed thread, and ended M01 pinned to SDK/CLI 0.144.6."
      sources:
        - planning/results/WP-M01-001.json
        - planning/results/WP-M01-004.json
        - planning/milestones/M01_local_desktop_conversation.json
        - services/adapter-host-node/package.json
        - services/adapter-host-node/src/codex-cli.ts
        - pnpm-lock.yaml
      proof: "WP-M01-001 and WP-M01-004 preserve the original 0.144.5 canaries; the final milestone record, package manifest and lockfile record the qualification upgrade to 0.144.6."
    - id: M01-PROTOCOL-EPOCH
      claim: "The unused scaffold was replaced by provider-neutral System, Project and Session services with authority-fenced watches, exact generated descriptors and a typed steering-compatible epoch."
      sources:
        - planning/results/WP-M01-002.json
        - docs/decisions/ADR-006-m01-protocol-epoch.md
        - protocols/proto/dennett/control/v1/system.proto
        - protocols/proto/dennett/control/v1/project.proto
        - protocols/proto/dennett/control/v1/session.proto
        - tools/protocol_codegen.py
      proof: "WP-M01-002 records descriptor-level service/field/oneof/stream checks, deterministic Rust/TypeScript generation and negative compatibility probes; WP-M01-007 records the backward-compatible steering additions."
    - id: M01-VISUAL-ITERATION
      claim: "Owner review rejected colored accents, excess chrome, browser-like controls, fake runtime artifacts and several failed blur/wallpaper approaches before accepting an achromatic native Windows Mica hierarchy."
      sources:
        - planning/results/WP-M01-003.json
        - docs/design/WP-M01-003/owner-direction-v2.md
        - docs/design/WP-M01-003/owner-direction-v3.md
        - docs/design/WP-M01-003/owner-direction-v4.md
        - docs/design/WP-M01-003/owner-direction-v5.md
        - design-qa.md
      proof: "The owner-direction series is the versioned feedback trail; design-qa.md identifies v7-v10 as rejected wallpaper/material attempts, v11 as the first Mica checkpoint and the later accepted layer/tint contract."
    - id: M01-RUNTIME-LIFECYCLE
      claim: "AgentRuntimePort normalizes ordered progress, opaque continuation, scoped idempotent Stop, deadline, cancellation, provider failure and late-event fencing without provider types entering the domain."
      sources:
        - planning/results/WP-M01-004.json
        - crates/dennett-agent-core/src/runtime.rs
        - crates/dennett-agent-core/tests/runtime_conformance.rs
        - services/adapter-host-node/src/codex-runtime-adapter.ts
        - services/adapter-host-node/src/codex-runtime-adapter.test.ts
      proof: "WP-M01-004 records the conformance set and the successful same-thread canary while explicitly excluding desktop IPC and persistence from that package."
    - id: M01-DURABLE-SESSION
      claim: "The embedded Head owns canonical session writes; SQLite stores an append-only revisioned journal, watch state begins with snapshot then monotonic deltas, gaps require resync, and drafts remain non-canonical."
      sources:
        - planning/results/WP-M01-005.json
        - adapters/storage/sqlite/src/lib.rs
        - adapters/storage/sqlite/migrations/0001_control_store.sql
        - adapters/storage/sqlite/migrations/0002_m01_runtime_state.sql
        - services/head/tests/session_restore.rs
      proof: "WP-M01-005 records rollback, WAL/FULL recovery and restart coverage; WP-M01-007 records durable command admission, continuation handles and monotonic draft revisions added by migration 0002."
    - id: M01-AUTHENTICATED-IPC
      claim: "Tauri connects to an independently owned persistent Node over Windows Named Pipes protected by current-user ACLs, bilateral identity checks, one-use bootstrap proof, bounded unauthenticated clients and reconnect/resync behavior."
      sources:
        - planning/results/WP-M01-006.json
        - adapters/transport/local-ipc/src/lib.rs
        - apps/desktop/src-tauri/src/system_bridge/node_process.rs
        - apps/desktop/src-tauri/src/system_bridge/conversation.rs
        - services/node/tests/desktop_lifecycle.rs
      proof: "WP-M01-006 records the transport and security boundary, negative cases and Windows-only limitation; M01-007 supplies the complete visible conversation over that boundary."
    - id: M01-PROVIDER-CONTROLS-AND-ACCESS
      claim: "Model, reasoning and speed choices come from the active Codex descriptor/catalogue; Auto-approve and Full access map to enforced non-interactive sandbox settings rather than decorative UI choices."
      sources:
        - planning/results/WP-M01-007.json
        - planning/milestones/M01_local_desktop_conversation.json
        - services/adapter-host-node/src/codex-model-catalog.test.ts
        - services/adapter-host-node/src/codex-workspace.test.ts
        - services/head/tests/conversation_application.rs
      proof: "The final Completion Packet records provider discovery and sandbox mapping; the milestone records the live Windows qualification that corrected workspace-write behavior."
    - id: M01-NATIVE-STEERING
      claim: "A clarification can be durably delivered to the exact active Codex turn through native App Server steering without hidden Stop, replacement turn or continuation restart."
      sources:
        - planning/results/WP-M01-007.json
        - services/head/tests/conversation_application.rs
        - services/adapter-host-node/src/codex-app-server-client.test.ts
        - services/node/tests/codex_live_e2e.rs
      proof: "The Completion Packet records stable message identity, idempotency and uncertainty fencing; deterministic Head/adapter tests and the explicitly run ignored live IPC test cover same-turn behavior."
    - id: M01-VISIBLE-CONVERSATION
      claim: "The accepted slice supports project and standalone chats, ordered safe commentary/effects/final Markdown, scoped Stop, visible timeout, resync, restart restoration, session-isolated drafts and fixed event timestamps."
      sources:
        - planning/results/WP-M01-007.json
        - apps/desktop/src/App.test.tsx
        - apps/desktop/src/App.native.test.tsx
        - services/head/tests/conversation_application.rs
        - services/node/tests/desktop_conversation_e2e.rs
        - VALIDATION.md
      proof: "WP-M01-007 enumerates 59 renderer, 14 Head and 4 real-process tests and explicitly distinguishes visible lifecycle states while excluding prompt/response content from telemetry."
    - id: M01-CLIPBOARD-AND-ATOMIC-READ
      claim: "Final owner qualification exposed an ineffective browser clipboard path and a non-atomic concurrent SQLite session read; the fixes use the official write-only Tauri plugin and a transactional snapshot with regressions."
      sources:
        - planning/results/WP-M01-007.json
        - apps/desktop/src/App.tsx
        - apps/desktop/src/App.native.test.tsx
        - apps/desktop/src-tauri/src/main.rs
        - apps/desktop/src-tauri/capabilities/default.json
        - adapters/storage/sqlite/src/lib.rs
      proof: "The Completion Packet records live Windows clipboard verification and the synchronized atomic-read regression; App.native.test.tsx covers native writeText and SQLite test session_reads_are_atomic_while_progress_is_appended covers the concurrent read."
    - id: M01-ACCEPTED-SCOPE
      claim: "M01 is an accepted Windows/Codex local-conversation slice, not a complete Dennett release; project filesystem/Git work, truthful runtime artifacts, other providers, sync, voice, installers and non-Windows certification remain outside it."
      sources:
        - planning/results/WP-M01-007.json
        - planning/milestones/M01_local_desktop_conversation.json
        - VALIDATION.md
      proof: "The final Completion Packet and validation record the accepted owner-visible capabilities, explicit deferrals and detached PASS at executable commit 24da00f."
