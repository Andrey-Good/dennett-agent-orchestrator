blog_evidence_packet:
  milestone: M01
  period:
    from: 2026-07-18
    to: 2026-07-21
  chronology:
    - "WP-M01-001 proved two streamed Codex turns on one subscription-authenticated thread without an API key."
    - "WP-M01-002 replaced the unused scaffold with provider-neutral System, Project, Session and Watch contracts."
    - "WP-M01-003 produced the first Project Chat renderer; owner review rejected colored accents, excess chrome and several incorrect navigation affordances."
    - "Four owner-direction documents and at least eight numbered native checkpoints converged on achromatic Windows Mica; a custom wallpaper projection and a large CSS blur surface were rejected."
    - "WP-M01-004 normalized streaming, continuation, scoped Stop, timeout and provider failures behind AgentRuntimePort."
    - "WP-M01-005 made the embedded Head the canonical session writer and persisted append-only revisioned history in SQLite."
    - "WP-M01-006 connected Tauri to a persistent Node over authenticated Windows Named Pipes."
    - "WP-M01-007 connected the complete path, added provider-discovered controls, standalone chats, ordered progress/final Markdown, drafts, resync and restart restoration."
    - "Live qualification replaced restart-based clarification with native exact-turn Codex steering and terminalized animations after Stop or timeout."
    - "The final owner pass exposed a browser-only clipboard implementation and a concurrent non-atomic SQLite read; both received native or transactional fixes plus regressions."
    - "The owner accepted WP-M01-007 and M01 on 2026-07-21; detached closure review returned PASS with no open P0-P2 findings."
  conversation_evidence:
    owner_quotes:
      - "Во первых почему все имеет фиолетовые оттенки. е это не нравиться. Пусть все будет исключительно в градациях серого от белого до черного."
      - "Визуально это не блюр а просто какое-то засветление. Нет эффекта размытого стекла."
      - "Кнопка появилась, но она ничего не добавляет в буфер обмена."
      - "Кстати, было бы хорошо, если бы ты следовал DRY KISS YAGNI подходам, если это не ухудшает качество."
      - "Меня все устраивает, одобряю."
    decision_turns:
      - "The first generated UX was rejected; owner feedback became versioned design evidence instead of informal chat-only taste."
      - "The owner preferred Figma-first tuning for future substantial screens after code-driven material iteration proved expensive."
      - "The owner rejected hardcoded runtime menus; controls now come from the active provider descriptor and model catalogue."
      - "The owner distinguished same-turn clarification from stop-and-restart; the implementation moved to the native Codex App Server steer capability."
      - "The owner required DRY/KISS/YAGNI without sacrificing planned extensibility; root engineering rules now demand simple internals behind stable replacement seams."
  input_materials:
    - planning/milestones/M01_local_desktop_conversation.json
    - planning/results/WP-M01-001.json
    - planning/results/WP-M01-002.json
    - planning/results/WP-M01-003.json
    - planning/results/WP-M01-004.json
    - planning/results/WP-M01-005.json
    - planning/results/WP-M01-006.json
