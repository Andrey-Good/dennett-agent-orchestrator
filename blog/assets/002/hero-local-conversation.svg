  <text x="90" y="185" fill="#f6f6f6" font-family="Segoe UI, sans-serif" font-size="58" font-weight="650">Чат, который должен</text>
  <text x="90" y="252" fill="#f6f6f6" font-family="Segoe UI, sans-serif" font-size="58" font-weight="650">пережить закрытое окно</text>
  <rect x="90" y="330" width="1420" height="430" rx="46" fill="url(#glass)" stroke="#fff" stroke-opacity="0.16"/>
  <rect x="90" y="330" width="310" height="430" rx="46" fill="#fff" opacity="0.045"/>
  <line x1="400" y1="365" x2="400" y2="725" stroke="#fff" stroke-opacity="0.12"/>
  <g font-family="Segoe UI, sans-serif">
    <text x="140" y="405" fill="#888" font-size="21">PROJECTS</text>
    <text x="140" y="458" fill="#f0f0f0" font-size="25">dennett-agent-orchestrator</text>
    <rect x="128" y="490" width="238" height="58" rx="20" fill="#fff" opacity="0.13"/>
    <text x="150" y="527" fill="#fff" font-size="22">Local conversation</text>
    <text x="455" y="405" fill="#b8b8b8" font-size="21">WORKED FOR 39s</text>
    <text x="455" y="463" fill="#f5f5f5" font-size="27">Проверяю состояние проекта и сохраняю результат.</text>
    <text x="455" y="515" fill="#b7b7b7" font-size="22">⌘  Ran command</text>
    <text x="455" y="572" fill="#f5f5f5" font-size="27">История восстановится даже после перезапуска UI.</text>
    <rect x="455" y="640" width="805" height="84" rx="30" fill="#2d2d2d" opacity="0.72"/>
    <text x="490" y="692" fill="#c7c7c7" font-size="24">Уточнить задачу во время активного turn…</text>
    <rect x="1295" y="372" width="175" height="320" rx="32" fill="#2d2d2d" opacity="0.67"/>
    <text x="1325" y="420" fill="#fff" font-size="22">Runtime</text>
    <text x="1325" y="476" fill="#aaa" font-size="19">Codex</text>
    <text x="1325" y="525" fill="#aaa" font-size="19">reasoning</text>
    <text x="1325" y="574" fill="#aaa" font-size="19">speed</text>
    <text x="1325" y="623" fill="#aaa" font-size="19">Full access</text>
